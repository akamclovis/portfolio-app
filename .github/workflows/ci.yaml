name: my first pipeline
on: push
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: build image
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/ciportfolio .
                docker build -t ${{ secrets.DOCKER_USERNAME }}/ciportfolio:${{github.run_number}} .  
            - name: list images
              run: docker images
            - name: login to docker
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Push image
              run: |
                docker push ${{ secrets.DOCKER_USERNAME }}/ciportfolio
                docker push ${{ secrets.DOCKER_USERNAME }}/ciportfolio:${{github.run_number}}
                
    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: ssh to linux and run container
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.SSH_USERNAME }}
                key: ${{ secrets.PRIVATE_KEY }}
                port: ${{ secrets.PORT }}
                script: |
                   docker --version
                   docker rm -f portfolio || echo " container not found"
                   docker run -d --name portfolio -p 8080:80 ${{secrets.DOCKER_USERNAME}}/ciportofolio